name: Sesame-AG 全自动构建系统（最终稳定版）
run-name: ${{ github.actor }} 触发的构建 | ${{ github.event_name }}

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  TARGET_SOURCE_BRANCH: dev

  # 解决 Node.js 20 弃用警告（全局生效）
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      latest_commit: ${{ steps.get_commit.outputs.latest_commit }}
      commit_message: ${{ steps.get_commit.outputs.commit_message }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          
      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: 添加原仓库上游
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          
      - name: 拉取原仓库更新
        run: git fetch upstream
        
      - name: 获取原仓库最新提交信息
        id: get_commit
        run: |
          echo "latest_commit=$(git rev-parse --short upstream/dev)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log --oneline -1 upstream/dev | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          
      - name: 合并原仓库dev分支
        run: |
          git checkout -B dev origin/dev
          git merge upstream/dev --no-edit -X theirs
          
      - name: 推送更新
        run: git push origin dev
        continue-on-error: true
        
      - name: 检查更新
        id: check_update
        run: |
          if git log --oneline -1 | grep -q "Merge remote-tracking branch 'upstream/dev'"; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到原仓库更新，将自动构建并发布" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 原仓库无更新，跳过构建" >> $GITHUB_STEP_SUMMARY
          fi

  build-and-sign:
    runs-on: ubuntu-latest
    needs: sync-upstream
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare_assets.outputs.version }}
      tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
      build_time: ${{ steps.prepare_assets.outputs.build_time }}
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push' ||
       needs.sync-upstream.outputs.has_update == 'true')
    
    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone Asia/Shanghai
        
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          
      - name: 工具链版本校验
        run: |
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          
      - name: 安装JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          
      - name: 配置Gradle环境
        run: echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          
      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: 安装SDK组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          
      # ✅ 修复：使用 v4 版本正确的参数，删除所有过时参数
      - name: 配置Gradle缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false
          # cache-cleanup 有效值：never / always / on-success（默认）
          cache-cleanup: on-success
          
      - name: 赋予执行权限
        run: chmod +x gradlew
        
      - name: 构建Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease
        
      - name: 准备APK
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done
          
      - name: 签名APK
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}
          
      - name: 显示签名完成的文件
        run: |
          echo "## ✅ 成功签名以下APK文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.sign_apks.outputs.signedFiles }}" | tr ':' '\n' | while read -r file; do
            echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done
          
      - name: 生成SHA256校验文件
        id: prepare_assets
        run: |
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            cp "${file}" "${ASSET_DIR}/"
            (cd "${ASSET_DIR}" && sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256")
          done
          
          # 获取版本号
          VERSION=$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          # 生成唯一标签名
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date '+%Y%m%d')
          echo "tag_name=v${VERSION}-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          
          # 生成构建时间（上海时区）
          echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
      - name: 创建GitHub Release（所有APK单独展示）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
          name: Sesame-AG v${{ steps.prepare_assets.outputs.version }} (${{ steps.prepare_assets.outputs.tag_name }})
          generate_release_notes: false
          make_latest: true
          files: |
            ${{ env.ASSET_DIR }}/*.apk
            ${{ env.ASSET_DIR }}/*.sha256
          body: |
            ## 📦 构建信息
            - 版本号：v${{ steps.prepare_assets.outputs.version }}
            - 构建时间：${{ steps.prepare_assets.outputs.build_time }}
            - 构建来源：${{ github.event_name }}
            
            ${{ needs.sync-upstream.outputs.has_update == 'true' && format('
            ## 📥 本次更新内容
            - 最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream.outputs.latest_commit, needs.sync-upstream.outputs.commit_message) || '' }}
            
            ## 📥 下载说明（点击文件名直接下载）
            | 文件名 | 适用设备 |
            |--------|----------|
            | `Sesame-AG-*-universal.apk` | **推荐**，所有安卓手机通用 |
            | `Sesame-AG-*-arm64-v8a.apk` | 64位ARM设备（绝大多数新手机） |
            | `Sesame-AG-*-armeabi-v7a.apk` | 32位ARM设备（旧款手机） |
            | `Sesame-AG-*-x86_64.apk` | 64位x86设备（部分模拟器） |
            | `Sesame-AG-*-x86.apk` | 32位x86设备（极少数旧模拟器） |
            | `CHECKSUMS-*.sha256` | 对应APK的SHA256校验文件 |
            
            > 安装完成后需要在LSPosed中激活模块并重启手机
          
      # 清理旧Release（保留最近10个v开头的版本）
      - name: 清理旧版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: 10
        run: |
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=100" | \
            jq -r '.[] | select(.tag_name | startswith("v")) | .id + " " + .tag_name' | \
            sort -r)
          
          count=$(echo "$releases" | wc -l)
          delete_count=$((count - KEEP_LATEST))
          
          if [ $delete_count -le 0 ]; then
            echo "ℹ️ 只有 $count 个版本，无需清理"
            exit 0
          fi
          
          echo "🗑️ 共 $count 个版本，保留最近 $KEEP_LATEST 个，删除 $delete_count 个旧版本"
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "$releases" | tail -n $delete_count | while read -r release_id tag_name; do
            echo "  删除版本: $tag_name" >> $GITHUB_STEP_SUMMARY
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$release_id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/git/refs/tags/$tag_name"
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 旧版本清理完成" >> $GITHUB_STEP_SUMMARY

  # ✅ 优化后的邮件通知：区分不同错误类型
  notify-email:
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-and-sign]
    if: ${{ always() && needs.build-and-sign.result != 'skipped' }}
    steps:
      - name: 发送邮件通知
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >
            ${{ needs.build-and-sign.result == 'success' && '✅ Sesame-AG 新版本已发布' || '❌ Sesame-AG 构建失败' }}
          body: |
            ${{ needs.build-and-sign.result == 'success' && '🎉 Sesame-AG 新版本已成功发布！' || '❌ Sesame-AG 构建失败！' }}
            
            ${{ needs.build-and-sign.result == 'success' && format('
            🔗 下载链接：{0}/{1}/releases/latest
            
            📦 版本信息：
            - 版本号：{2}
            - 构建时间：{3}
            ', github.server_url, github.repository, needs.build-and-sign.outputs.version, needs.build-and-sign.outputs.build_time) || format('
            🔗 查看详细错误日志：{0}/{1}/actions/runs/{2}
            
            🚨 可能的失败原因：
            1. 配置文件语法错误（最常见）
            2. 依赖下载失败（网络问题）
            3. 签名密钥错误或过期
            4. 原仓库代码更新导致编译失败
            
            🔧 解决方法：
            1. 点击上面的链接查看具体哪一步失败
            2. 复制错误日志中的红色错误信息
            3. 点击右上角「Re-run jobs」重新运行尝试
            ', github.server_url, github.repository, github.run_id) }}
            
            ${{ needs.sync-upstream.outputs.has_update == 'true' && format('
            📥 本次同步内容：
            - 原仓库最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream.outputs.latest_commit, needs.sync-upstream.outputs.commit_message) || '' }}
            
            ${{ needs.build-and-sign.result == 'success' && '点击上面的链接即可直接下载APK安装使用。' || '' }}
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: GitHub Actions

  notify-failure:
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-and-sign]
    if: ${{ failure() }}
    steps:
      - name: 构建失败通知
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请点击上方的失败任务查看详细错误日志" >> $GITHUB_STEP_SUMMARY
          echo "不要只看这个摘要页面，要点进具体的步骤看红色错误信息" >> $GITHUB_STEP_SUMMARY
