name: Sesame-AG 全自动构建系统（基于官方流程）
run-name: ${{ github.actor }} 触发的构建 | ${{ github.event_name }}

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch: # 允许手动触发
  schedule:
    # 每天北京时间早上8点自动运行(UTC 0点)
    - cron: '0 0 * * *'

env:
  # 官方原版环境变量（完全不变）
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  TARGET_SOURCE_BRANCH: dev

jobs:
  # 任务1：自动同步原仓库更新（仅定时/手动触发）
  sync-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      latest_commit: ${{ steps.get_commit.outputs.latest_commit }}
      commit_message: ${{ steps.get_commit.outputs.commit_message }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          
      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: 添加原仓库上游
        run: git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
        
      - name: 拉取原仓库更新
        run: git fetch upstream
        
      - name: 获取原仓库最新提交信息
        id: get_commit
        run: |
          echo "latest_commit=$(git rev-parse --short upstream/dev)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log --oneline -1 upstream/dev | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          
      - name: 合并原仓库dev分支到本地dev分支
        run: |
          git checkout dev
          git merge upstream/dev --no-edit -X theirs
          
      - name: 推送更新到你的仓库
        run: git push origin dev
        continue-on-error: true
        
      - name: 检查是否有更新
        id: check_update
        run: |
          if git log --oneline -1 | grep -q "Merge remote-tracking branch 'upstream/dev'"; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到原仓库更新，将自动触发构建" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 原仓库无更新，跳过构建" >> $GITHUB_STEP_SUMMARY
          fi

  # 任务2：官方标准构建流程
  build-and-sign:
    runs-on: ubuntu-latest
    needs: sync-upstream
    # ✅ 修复后的条件：
    # 1. 手动触发 或
    # 2. 有更新自动触发 或
    # 3. 提交代码触发 或
    # 4. 同步任务被跳过（push事件）
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push' ||
       needs.sync-upstream.outputs.has_update == 'true')
    
    steps:
      - name: 设置时区为上海
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "当前时间: $(date)"
          
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev # 始终构建dev分支最新代码
          
      # ✅ 官方原版：工具链基线校验（防止版本不兼容）
      - name: 验证项目工具链版本
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          echo "✅ 所有工具链版本校验通过" >> $GITHUB_STEP_SUMMARY
          
      - name: 安装JDK 17.0.1
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64
          cache: gradle # 开启Gradle缓存
          
      - name: 配置Gradle Java环境
        shell: bash
        run: |
          set -euo pipefail
          echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          
      # ✅ 官方原版：正确的Android SDK安装方式
      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: 安装所需SDK组件
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          
      - name: 配置Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper
          
      - name: 赋予gradlew执行权限
        run: chmod +x gradlew
        
      - name: 构建Release版APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace assembleRelease
          
      - name: 准备未签名APK
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "❌ 在 ${RELEASE_DIR} 中未找到任何Release APK" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done
          echo "✅ 找到 ${#apks[@]} 个APK文件" >> $GITHUB_STEP_SUMMARY
          
      # ✅ 适配你的密钥名称（不需要修改Secrets）
      - name: 签名APK
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}
          
      - name: 生成SHA256校验文件
        id: prepare_assets
        shell: bash
        run: |
          set -euo pipefail
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          copied=0
          for file in "${files[@]}"; do
            [[ -n "${file}" ]] || continue
            cp "${file}" "${ASSET_DIR}/"
            (
              cd "${ASSET_DIR}"
              sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256"
            )
            copied=$((copied + 1))
          done
          if [[ ${copied} -eq 0 ]]; then
            echo "❌ 未生成任何已签名APK" >&2
            exit 1
          fi
          echo "asset_dir=${ASSET_DIR}" >> $GITHUB_OUTPUT
          echo "✅ 成功签名 ${copied} 个APK文件" >> $GITHUB_STEP_SUMMARY
          
      # ✅ 自动清理7天前的旧构建产物
      - name: 清理旧构建产物
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '7 days'
          skip-recent: 5 # 始终保留最近5个版本
          
      # ✅ 单独上传通用版（推荐下载）
      - name: 上传通用版APK
        uses: actions/upload-artifact@v7
        with:
          name: Sesame-AG-通用版-已签名（推荐）
          path: ${{ steps.prepare_assets.outputs.asset_dir }}/*-universal.apk
          retention-days: 30
          
      # ✅ 上传全部架构APK+校验文件
      - name: 上传全部架构APK
        uses: actions/upload-artifact@v7
        with:
          name: Sesame-AG-全部架构-已签名
          path: ${{ steps.prepare_assets.outputs.asset_dir }}/*
          retention-days: 30
          
      # ✅ 构建成功总结
      - name: 构建成功总结
        run: |
          echo "## 🎉 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.sync-upstream.outputs.has_update }}" == "true" ]]; then
            echo "### 📥 本次更新内容" >> $GITHUB_STEP_SUMMARY
            echo "- 最新提交: ${{ needs.sync-upstream.outputs.latest_commit }}" >> $GITHUB_STEP_SUMMARY
            echo "- 提交信息: ${{ needs.sync-upstream.outputs.commit_message }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 📦 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "- 通用版APK（推荐）：所有手机通用，直接下载安装" >> $GITHUB_STEP_SUMMARY
          echo "- 全部架构APK：包含arm64-v8a/armeabi-v7a/x86/x86_64/universal" >> $GITHUB_STEP_SUMMARY
          echo "- 每个APK附带SHA256校验文件，可验证文件完整性" >> $GITHUB_STEP_SUMMARY

  # 任务3：构建失败通知
  notify-failure:
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-and-sign]
    if: ${{ failure() }}
    steps:
      - name: 构建失败通知
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请点击上方的失败任务查看详细错误日志" >> $GITHUB_STEP_SUMMARY
          echo "常见原因：网络超时、依赖下载失败" >> $GITHUB_STEP_SUMMARY
          echo "解决方法：点击右上角的「Re-run jobs」重新运行" >> $GITHUB_STEP_SUMMARY
