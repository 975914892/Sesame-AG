name: Sesame-AG 双分支全自动构建系统
run-name: ${{ github.actor }} 触发的构建 | ${{ github.event_name }}

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动检测

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets

  # 强制Node 24，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ==================== dev分支同步检测 ====================
  sync-upstream-dev:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      latest_commit: ${{ steps.get_commit.outputs.latest_commit }}
      commit_message: ${{ steps.get_commit.outputs.commit_message }}
    steps:
      - name: 检出dev分支代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: dev
          
      - name: 配置Git用户与权限
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          
      - name: 添加原仓库上游
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          
      - name: 拉取原仓库dev分支更新
        run: git fetch upstream dev
          
      - name: 获取原仓库dev分支最新提交
        id: get_commit
        run: |
          echo "latest_commit=$(git rev-parse --short upstream/dev)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log --oneline -1 upstream/dev | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          
      - name: 合并更新并检测是否有变化
        id: check_update
        run: |
          BEFORE_COMMIT=$(git rev-parse HEAD)
          git merge upstream/dev --no-edit -X theirs
          AFTER_COMMIT=$(git rev-parse HEAD)
          
          if [ "$BEFORE_COMMIT" != "$AFTER_COMMIT" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ [dev分支] 检测到原仓库更新" >> $GITHUB_STEP_SUMMARY
            echo "更新前: $BEFORE_COMMIT" >> $GITHUB_STEP_SUMMARY
            echo "更新后: $AFTER_COMMIT" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️ [dev分支] 原仓库无更新，跳过构建" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: 推送更新到本地dev分支
        if: steps.check_update.outputs.has_update == 'true'
        run: git push origin dev

  # ==================== main分支同步检测 ====================
  sync-upstream-main:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      latest_commit: ${{ steps.get_commit.outputs.latest_commit }}
      commit_message: ${{ steps.get_commit.outputs.commit_message }}
    steps:
      - name: 检出main分支代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          ref: main
          
      - name: 配置Git用户与权限
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          
      - name: 添加原仓库上游
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          
      - name: 拉取原仓库main分支更新
        run: git fetch upstream main
          
      - name: 获取原仓库main分支最新提交
        id: get_commit
        run: |
          echo "latest_commit=$(git rev-parse --short upstream/main)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log --oneline -1 upstream/main | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          
      - name: 合并更新并检测是否有变化
        id: check_update
        run: |
          BEFORE_COMMIT=$(git rev-parse HEAD)
          git merge upstream/main --no-edit -X theirs
          AFTER_COMMIT=$(git rev-parse HEAD)
          
          if [ "$BEFORE_COMMIT" != "$AFTER_COMMIT" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ [main分支] 检测到原仓库更新" >> $GITHUB_STEP_SUMMARY
            echo "更新前: $BEFORE_COMMIT" >> $GITHUB_STEP_SUMMARY
            echo "更新后: $AFTER_COMMIT" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️ [main分支] 原仓库无更新，跳过构建" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: 推送更新到本地main分支
        if: steps.check_update.outputs.has_update == 'true'
        run: git push origin main

  # ==================== dev分支构建发布 ====================
  build-and-sign-dev:
    runs-on: ubuntu-latest
    needs: sync-upstream-dev
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare_assets.outputs.version }}
      tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
      build_time: ${{ steps.prepare_assets.outputs.build_time }}
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_name == 'dev') ||
       needs.sync-upstream-dev.outputs.has_update == 'true')
    
    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone Asia/Shanghai
        
      - name: 检出dev分支代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          
      - name: 工具链版本校验
        run: |
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          
      - name: 安装JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          
      - name: 配置Gradle环境
        run: echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          
      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: 安装SDK组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          
      - name: 配置Gradle缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false
          cache-cleanup: on-success
          
      - name: 赋予执行权限
        run: chmod +x gradlew
        
      - name: 构建Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease
        
      - name: 准备APK文件
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done
          
      - name: 签名APK
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}
          
      - name: 显示签名完成的文件
        run: |
          echo "## ✅ [dev分支] 成功签名以下APK文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.sign_apks.outputs.signedFiles }}" | tr ':' '\n' | while read -r file; do
            echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done
          
      - name: 生成SHA256校验文件与版本信息
        id: prepare_assets
        run: |
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            cp "${file}" "${ASSET_DIR}/"
            (cd "${ASSET_DIR}" && sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256")
          done
          
          VERSION=$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date '+%Y%m%d')
          # 标签名带dev标识，区分分支
          echo "tag_name=v${VERSION}-dev-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
      - name: 发布GitHub Release（dev分支）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
          name: 【dev分支】Sesame-AG v${{ steps.prepare_assets.outputs.version }}
          generate_release_notes: false
          make_latest: false # dev分支不标记为latest
          files: |
            ${{ env.ASSET_DIR }}/*.apk
            ${{ env.ASSET_DIR }}/*.sha256
          body: |
            ## 📦 构建信息
            - 所属分支：**dev（开发版）**
            - 版本号：v${{ steps.prepare_assets.outputs.version }}
            - 构建时间：${{ steps.prepare_assets.outputs.build_time }}
            - 构建来源：${{ github.event_name }}
            
            ${{ needs.sync-upstream-dev.outputs.has_update == 'true' && format('
            ## 📥 本次更新内容
            - 原仓库最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream-dev.outputs.latest_commit, needs.sync-upstream-dev.outputs.commit_message) || '' }}
            
            ## 📥 下载说明
            | 文件名 | 适用设备 |
            |--------|----------|
            | `*-universal.apk` | 通用版，所有安卓手机通用（推荐） |
            | `*-arm64-v8a.apk` | 64位ARM设备（绝大多数新手机） |
            | `*-armeabi-v7a.apk` | 32位ARM设备（旧款手机） |
            | `*-x86_64.apk` | 64位x86设备（部分模拟器） |
            | `*-x86.apk` | 32位x86设备（极少数旧模拟器） |
            | `CHECKSUMS-*.sha256` | 对应APK的SHA256校验文件 |
            
            > 安装完成后需要在LSPosed中激活模块并重启手机
          
      - name: 清理dev分支旧版本（保留最近10个）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: 10
        run: |
          # 只清理带-dev-标识的Release
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=100" | \
            jq -r '.[] | select(.tag_name | contains("-dev-")) | .id + " " + .tag_name' | \
            sort -r)
          
          count=$(echo "$releases" | wc -l)
          delete_count=$((count - KEEP_LATEST))
          
          if [ $delete_count -le 0 ]; then
            echo "ℹ️ dev分支只有 $count 个版本，无需清理"
            exit 0
          fi
          
          echo "🗑️ dev分支共 $count 个版本，保留最近 $KEEP_LATEST 个，删除 $delete_count 个旧版本"
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "$releases" | tail -n $delete_count | while read -r release_id tag_name; do
            echo "  删除版本: $tag_name" >> $GITHUB_STEP_SUMMARY
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$release_id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/git/refs/tags/$tag_name"
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ dev分支旧版本清理完成" >> $GITHUB_STEP_SUMMARY

  # ==================== main分支构建发布 ====================
  build-and-sign-main:
    runs-on: ubuntu-latest
    needs: sync-upstream-main
    permissions:
      contents: write
    outputs:
      version: ${{ steps.prepare_assets.outputs.version }}
      tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
      build_time: ${{ steps.prepare_assets.outputs.build_time }}
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_name == 'main') ||
       (github.event_name == 'push' && github.ref_name == 'master') ||
       needs.sync-upstream-main.outputs.has_update == 'true')
    
    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone Asia/Shanghai
        
      - name: 检出main分支代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          
      - name: 工具链版本校验
        run: |
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          
      - name: 安装JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          
      - name: 配置Gradle环境
        run: echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          
      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: 安装SDK组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          
      - name: 配置Gradle缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false
          cache-cleanup: on-success
          
      - name: 赋予执行权限
        run: chmod +x gradlew
        
      - name: 构建Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease
        
      - name: 准备APK文件
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done
          
      - name: 签名APK
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}
          
      - name: 显示签名完成的文件
        run: |
          echo "## ✅ [main分支] 成功签名以下APK文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.sign_apks.outputs.signedFiles }}" | tr ':' '\n' | while read -r file; do
            echo "- $(basename "$file")" >> $GITHUB_STEP_SUMMARY
          done
          
      - name: 生成SHA256校验文件与版本信息
        id: prepare_assets
        run: |
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            cp "${file}" "${ASSET_DIR}/"
            (cd "${ASSET_DIR}" && sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256")
          done
          
          VERSION=$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date '+%Y%m%d')
          # 标签名带main标识，区分分支
          echo "tag_name=v${VERSION}-main-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
      - name: 发布GitHub Release（main分支）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
          name: 【main分支】Sesame-AG v${{ steps.prepare_assets.outputs.version }}
          generate_release_notes: false
          make_latest: true # main稳定版标记为latest
          files: |
            ${{ env.ASSET_DIR }}/*.apk
            ${{ env.ASSET_DIR }}/*.sha256
          body: |
            ## 📦 构建信息
            - 所属分支：**main（稳定版）**
            - 版本号：v${{ steps.prepare_assets.outputs.version }}
            - 构建时间：${{ steps.prepare_assets.outputs.build_time }}
            - 构建来源：${{ github.event_name }}
            
            ${{ needs.sync-upstream-main.outputs.has_update == 'true' && format('
            ## 📥 本次更新内容
            - 原仓库最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream-main.outputs.latest_commit, needs.sync-upstream-main.outputs.commit_message) || '' }}
            
            ## 📥 下载说明
            | 文件名 | 适用设备 |
            |--------|----------|
            | `*-universal.apk` | 通用版，所有安卓手机通用（推荐） |
            | `*-arm64-v8a.apk` | 64位ARM设备（绝大多数新手机） |
            | `*-armeabi-v7a.apk` | 32位ARM设备（旧款手机） |
            | `*-x86_64.apk` | 64位x86设备（部分模拟器） |
            | `*-x86.apk` | 32位x86设备（极少数旧模拟器） |
            | `CHECKSUMS-*.sha256` | 对应APK的SHA256校验文件 |
            
            > 安装完成后需要在LSPosed中激活模块并重启手机
          
      - name: 清理main分支旧版本（保留最近10个）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP_LATEST: 10
        run: |
          # 只清理带-main-标识的Release
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=100" | \
            jq -r '.[] | select(.tag_name | contains("-main-")) | .id + " " + .tag_name' | \
            sort -r)
          
          count=$(echo "$releases" | wc -l)
          delete_count=$((count - KEEP_LATEST))
          
          if [ $delete_count -le 0 ]; then
            echo "ℹ️ main分支只有 $count 个版本，无需清理"
            exit 0
          fi
          
          echo "🗑️ main分支共 $count 个版本，保留最近 $KEEP_LATEST 个，删除 $delete_count 个旧版本"
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "$releases" | tail -n $delete_count | while read -r release_id tag_name; do
            echo "  删除版本: $tag_name" >> $GITHUB_STEP_SUMMARY
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$release_id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/git/refs/tags/$tag_name"
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ main分支旧版本清理完成" >> $GITHUB_STEP_SUMMARY

  # ==================== 汇总邮件通知 ====================
  notify-email:
    runs-on: ubuntu-latest
    needs: [sync-upstream-dev, sync-upstream-main, build-and-sign-dev, build-and-sign-main]
    if: ${{ always() && (needs.build-and-sign-dev.result != 'skipped' || needs.build-and-sign-main.result != 'skipped') }}
    steps:
      - name: 发送汇总邮件通知
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >
            ${{ 
              (needs.build-and-sign-dev.result == 'success' || needs.build-and-sign-main.result == 'success') 
              && '✅ Sesame-AG 新版本构建完成' 
              || '❌ Sesame-AG 构建出现失败' 
            }}
          body: |
            # Sesame-AG 双分支构建结果汇总
            
            ## 📌 main分支（稳定版）
            - 同步状态：${{ needs.sync-upstream-main.outputs.has_update == 'true' && '检测到更新' || '无更新' }}
            - 构建状态：${{ needs.build-and-sign-main.result == 'success' && '✅ 构建成功' || needs.build-and-sign-main.result == 'skipped' && '⏭️ 跳过构建' || '❌ 构建失败' }}
            
            ${{ needs.build-and-sign-main.result == 'success' && format('
            - 版本号：{0}
            - 构建时间：{1}
            - 下载链接：{2}/{3}/releases/tag/{4}
            ', needs.build-and-sign-main.outputs.version, needs.build-and-sign-main.outputs.build_time, github.server_url, github.repository, needs.build-and-sign-main.outputs.tag_name) || '' }}
            
            ${{ needs.sync-upstream-main.outputs.has_update == 'true' && format('
            - 更新提交：{0}
            - 更新说明：{1}
            ', needs.sync-upstream-main.outputs.latest_commit, needs.sync-upstream-main.outputs.commit_message) || '' }}
            
            ---
            
            ## 🚧 dev分支（开发版）
            - 同步状态：${{ needs.sync-upstream-dev.outputs.has_update == 'true' && '检测到更新' || '无更新' }}
            - 构建状态：${{ needs.build-and-sign-dev.result == 'success' && '✅ 构建成功' || needs.build-and-sign-dev.result == 'skipped' && '⏭️ 跳过构建' || '❌ 构建失败' }}
            
            ${{ needs.build-and-sign-dev.result == 'success' && format('
            - 版本号：{0}
            - 构建时间：{1}
            - 下载链接：{2}/{3}/releases/tag/{4}
            ', needs.build-and-sign-dev.outputs.version, needs.build-and-sign-dev.outputs.build_time, github.server_url, github.repository, needs.build-and-sign-dev.outputs.tag_name) || '' }}
            
            ${{ needs.sync-upstream-dev.outputs.has_update == 'true' && format('
            - 更新提交：{0}
            - 更新说明：{1}
            ', needs.sync-upstream-dev.outputs.latest_commit, needs.sync-upstream-dev.outputs.commit_message) || '' }}
            
            ---
            
            ## 💡 说明
            - main分支为稳定版，标记为Latest，推荐日常使用
            - dev分支为开发版，包含最新功能但可能存在不稳定
            - 构建失败请查看日志详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: GitHub Actions 构建系统

  # ==================== 失败摘要提示 ====================
  notify-failure:
    runs-on: ubuntu-latest
    needs: [sync-upstream-dev, sync-upstream-main, build-and-sign-dev, build-and-sign-main]
    if: ${{ failure() }}
    steps:
      - name: 构建失败汇总
        run: |
          echo "## ❌ 构建任务出现失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- main分支状态：${{ needs.build-and-sign-main.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- dev分支状态：${{ needs.build-and-sign-dev.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请点击对应任务查看详细错误日志" >> $GITHUB_STEP_SUMMARY
