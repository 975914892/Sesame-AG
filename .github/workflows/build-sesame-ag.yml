name: Sesame-AG 全自动构建系统（Release版）
run-name: ${{ github.actor }} 触发的构建 | ${{ github.event_name }}

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  TARGET_SOURCE_BRANCH: dev

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      has_update: ${{ steps.check_update.outputs.has_update }}
      latest_commit: ${{ steps.get_commit.outputs.latest_commit }}
      commit_message: ${{ steps.get_commit.outputs.commit_message }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          
      - name: 配置Git用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: 添加原仓库上游
        run: |
          # 先删除已存在的upstream（避免重复添加）
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          
      - name: 拉取原仓库更新
        run: git fetch upstream
        
      - name: 获取原仓库最新提交信息
        id: get_commit
        run: |
          echo "latest_commit=$(git rev-parse --short upstream/dev)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log --oneline -1 upstream/dev | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          
      # ✅ 修复：明确指定切换到origin/dev分支
      - name: 合并原仓库dev分支
        run: |
          # 强制创建并切换到本地dev分支，跟踪origin/dev
          git checkout -B dev origin/dev
          # 合并upstream/dev的更新，自动解决冲突（优先采用原仓库代码）
          git merge upstream/dev --no-edit -X theirs
          
      - name: 推送更新
        run: git push origin dev
        continue-on-error: true
        
      - name: 检查更新
        id: check_update
        run: |
          if git log --oneline -1 | grep -q "Merge remote-tracking branch 'upstream/dev'"; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到原仓库更新，将自动构建并发布" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 原仓库无更新，跳过构建" >> $GITHUB_STEP_SUMMARY
          fi

  build-and-sign:
    runs-on: ubuntu-latest
    needs: sync-upstream
    permissions:
      contents: write # 必须添加，否则无法创建Release
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push' ||
       needs.sync-upstream.outputs.has_update == 'true')
    
    steps:
      - name: 设置时区
        run: sudo timedatectl set-timezone Asia/Shanghai
        
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          
      - name: 工具链版本校验
        run: |
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          
      - name: 安装JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          
      - name: 配置Gradle环境
        run: echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          
      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: 安装SDK组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          
      - name: 配置Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper
          
      - name: 赋予执行权限
        run: chmod +x gradlew
        
      - name: 构建Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease
        
      - name: 准备APK
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}" "${ASSET_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done
          
      - name: 签名APK
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}
          
      - name: 生成校验文件和打包全部架构
        id: prepare_assets
        run: |
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          for file in "${files[@]}"; do
            cp "${file}" "${ASSET_DIR}/"
            (cd "${ASSET_DIR}" && sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256")
          done
          
          # 打包全部架构APK为一个ZIP
          (cd "${ASSET_DIR}" && zip -r Sesame-AG-全部架构.zip *.apk *.sha256)
          
          # 提取通用版APK路径
          UNIVERSAL_APK=$(find "${ASSET_DIR}" -name "*-universal.apk")
          echo "universal_apk=${UNIVERSAL_APK}" >> $GITHUB_OUTPUT
          echo "all_zip=${ASSET_DIR}/Sesame-AG-全部架构.zip" >> $GITHUB_OUTPUT
          
          # 获取版本号
          VERSION=$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          # 生成唯一标签名：版本号-日期-提交哈希
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date '+%Y%m%d')
          echo "tag_name=v${VERSION}-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          
      # ✅ 自动创建GitHub Release
      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_assets.outputs.tag_name }}
          name: Sesame-AG v${{ steps.prepare_assets.outputs.version }} (${{ steps.prepare_assets.outputs.tag_name }})
          generate_release_notes: false
          make_latest: true
          files: |
            ${{ steps.prepare_assets.outputs.universal_apk }}
            ${{ steps.prepare_assets.outputs.all_zip }}
          body: |
            ## 📦 构建信息
            - 版本号：v${{ steps.prepare_assets.outputs.version }}
            - 构建时间：${{ steps.prepare_assets.outputs.tag_name }}
            - 构建来源：${{ github.event_name }}
            
            ${{ needs.sync-upstream.outputs.has_update == 'true' && format('
            ## 📥 本次更新内容
            - 最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream.outputs.latest_commit, needs.sync-upstream.outputs.commit_message) || '' }}
            
            ## 📥 下载说明
            - **Sesame-AG-*-universal.apk**：通用版（推荐），所有手机都能安装
            - **Sesame-AG-全部架构.zip**：包含arm64-v8a/armeabi-v7a/x86/x86_64/universal所有版本 + SHA256校验文件
            
            > 安装完成后需要在LSPosed中激活模块并重启手机
          
      # ✅ 清理旧产物（保留最近10个Release）
      - name: 清理旧Release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ✅ 邮件通知任务
  notify-email:
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-and-sign]
    if: ${{ always() && needs.build-and-sign.result != 'skipped' }}
    steps:
      - name: 发送邮件通知
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com # QQ邮箱：smtp.qq.com；163邮箱：smtp.163.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }} # 邮箱授权码，不是登录密码
          subject: >
            ${{ needs.build-and-sign.result == 'success' && '✅ Sesame-AG 新版本已发布' || '❌ Sesame-AG 构建失败' }}
          body: |
            ${{ needs.build-and-sign.result == 'success' && '
            🎉 Sesame-AG 新版本已成功发布！
            
            🔗 下载链接：${{ github.server_url }}/${{ github.repository }}/releases/latest
            
            📦 版本信息：
            - 版本号：${{ needs.build-and-sign.outputs.version }}
            - 构建时间：${{ github.run_started_at }}
            
            ${{ needs.sync-upstream.outputs.has_update == 'true' && format('
            📥 更新内容：
            - 最新提交：{0}
            - 提交信息：{1}
            ', needs.sync-upstream.outputs.latest_commit, needs.sync-upstream.outputs.commit_message) || '' }}
            
            点击上面的链接即可直接下载APK安装使用。
            ' || '
            ❌ Sesame-AG 构建失败！
            
            🔗 查看错误日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            常见原因：网络超时、依赖下载失败
            解决方法：点击页面右上角的「Re-run jobs」重新运行
            ' }}
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: GitHub Actions

  notify-failure:
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-and-sign]
    if: ${{ failure() }}
    steps:
      - name: 构建失败通知
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请点击上方的失败任务查看详细错误日志" >> $GITHUB_STEP_SUMMARY
          echo "常见原因：网络超时、依赖下载失败" >> $GITHUB_STEP_SUMMARY
          echo "解决方法：点击右上角的「Re-run jobs」重新运行" >> $GITHUB_STEP_SUMMARY
